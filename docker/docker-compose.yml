version: '3'

services:
  airflow:
    build: .
    container_name: airflow_weather
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ../dags:/opt/airflow/dags
      - ../include:/opt/airflow/include
      - ../data:/opt/airflow/data
    command: standalone
